<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPG Cylinder Inventory System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>LPG Cylinder Inventory</h1>
            <p class="subtitle">Depot Inventory Management System</p>
        </header>

        <nav class="navbar">
            <button class="nav-btn active" data-section="dashboard">
                <span class="nav-icon">📊</span>
                Dashboard
            </button>
            <button class="nav-btn" data-section="scan-in">
                <span class="nav-icon">📥</span>
                Scan IN
            </button>
            <button class="nav-btn" data-section="scan-out">
                <span class="nav-icon">📤</span>
                Scan OUT
            </button>
            <button class="nav-btn" data-section="inventory">
                <span class="nav-icon">📦</span>
                Inventory
            </button>
        </nav>

        <!-- Dashboard Section -->
        <section id="dashboard" class="section active">
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <div class="stat-label">Total In Stock</div>
                        <div class="stat-value" id="totalInStock">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <div class="stat-label">Full Cylinders</div>
                        <div class="stat-value" id="fullCylinders">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚪</div>
                    <div class="stat-content">
                        <div class="stat-label">Empty Cylinders</div>
                        <div class="stat-value" id="emptyCylinders">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📤</div>
                    <div class="stat-content">
                        <div class="stat-label">Scanned Out</div>
                        <div class="stat-value" id="scannedOut">0</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Scan IN Section -->
        <section id="scan-in" class="section">
            <div class="form-container">
                <h2>Register New Cylinder</h2>
                <form id="scanInForm" class="form">
                    <div class="form-group">
                        <label for="glpCode">GLP Code *</label>
                        <input type="text" id="glpCode" placeholder="e.g., GLPKEH06779F" required>
                    </div>

                    <div class="form-group">
                        <label for="brand">Brand *</label>
                        <select id="brand" required>
                            <option value="">Select Brand</option>
                            <option value="PayGo">PayGo</option>
                            <option value="Wajiko">Wajiko</option>
                            <option value="GreenWells">GreenWells</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" required>
                            <option value="">Select Status</option>
                            <option value="Full">Full</option>
                            <option value="Empty">Empty</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg) *</label>
                        <input type="number" id="weight" placeholder="e.g., 24.5" step="0.1" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Register Cylinder</button>
                </form>

                <div id="scanInMessage" class="message"></div>

                <div id="qrContainer" class="qr-container" style="display: none;">
                    <h3>QR Code Generated</h3>
                    <canvas id="qrCanvas"></canvas>
                    <div class="qr-info">
                        <p>GLP Code: <strong id="qrGlp"></strong></p>
                        <p>Scan this QR code for verification.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Scan OUT Section -->
        <section id="scan-out" class="section">
            <div class="form-container">
                <h2>Scan Out Cylinder</h2>
                <form id="scanOutForm" class="form">
                    <div class="form-group">
                        <label for="glpCodeOut">GLP Code *</label>
                        <input type="text" id="glpCodeOut" placeholder="e.g., GLPKEH06779F" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Search Cylinder</button>
                </form>

                <div id="scanOutMessage" class="message"></div>

                <div id="cylinderDetails" class="cylinder-details" style="display: none;">
                    <div class="detail-card">
                        <div class="detail-row">
                            <span class="detail-label">GLP Code:</span>
                            <span class="detail-value" id="detailGlp"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Brand:</span>
                            <span class="detail-value" id="detailBrand"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Weight:</span>
                            <span class="detail-value" id="detailWeight"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Status:</span>
                            <span class="detail-value" id="detailStatus"></span>
                        </div>
                        <div class="detail-qr">
                            <canvas id="detailQrCanvas"></canvas>
                        </div>
                        <button type="button" class="btn btn-danger" id="confirmScanOut">Confirm Scan Out</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Inventory Section -->
        <section id="inventory" class="section">
            <div class="inventory-container">
                <h2>Inventory</h2>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="all">All Cylinders</button>
                    <button class="tab-btn" data-tab="full">Full Cylinders</button>
                    <button class="tab-btn" data-tab="empty">Empty Cylinders</button>
                </div>

                <div id="all" class="tab-content active"></div>
                <div id="full" class="tab-content"></div>
                <div id="empty" class="tab-content"></div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/qr.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
