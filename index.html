<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LPG Cylinder Inventory</title>
  <link rel="stylesheet" href="styles.css">
  <!-- QR generator (Qrious) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <!-- QR scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
</head>
<body>
  <main class="container">
    <header>
      <h1>LPG Cylinder Inventory System</h1>
    </header>

    <nav class="main-nav">
      <button id="btn-scan-in" class="nav-btn">Scan IN</button>
      <button id="btn-scan-out" class="nav-btn">Scan OUT</button>
      <button id="btn-inventory" class="nav-btn">Inventory</button>
    </nav>

    <section id="content">
      <!-- dynamic content renders here -->
    </section>

    <footer class="footer">
      <small>Simple inventory — localStorage. Future: backend + DB + hosted scanner.</small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
